<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Top 20 Books — yfofana</title>
  <meta
    name="description"
    content="My top 20 books for inner peace, creativity, discipline, and clarity."
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/personal brand/css/style.css" />
</head>

<body>
  <header class="topbar" aria-label="Site navigation">
    <div class="container topbar__inner">
      <a class="brand" href="/index.html" aria-label="Home">
        <span class="brand__mark brand__mark--word">yfofana</span>
      </a>

      <nav class="nav">
        <a class="nav__link" href="./books.html" aria-current="page">Read my top 20 books</a>
      </nav>
    </div>
  </header>

  <main class="books-page" aria-label="Top 20 books">
    <div class="container books-page__inner">
      <div class="book-cover" aria-hidden="true">
        <div class="book-cover__top">
          <div class="book-cover__eyebrow">YFOFANA</div>
          <div class="book-cover__title">
            INNER WORLD<br />
            READING LIST
          </div>
        </div>
        <div class="book-cover__bottom">
          <div class="book-cover__bottomText">
            TOP 20 BOOKS FOR<br />
            CLARITY & INNER PEACE
          </div>
        </div>
      </div>

      <h1 class="books-page__headline">My top 20 books that changed my inner world.</h1>
      <p class="books-page__subhead">Where should I send it?</p>

      <form
        class="books-form"
        id="booksForm"
        action="https://formspree.io/f/mpwjalyj"
        method="POST"
        novalidate
      >
        <label class="sr-only" for="name">Name</label>
        <input
          class="input books-form__input"
          id="name"
          name="name"
          type="text"
          placeholder="Your name"
          required
        />

        <label class="sr-only" for="email">Email</label>
        <input
          class="input books-form__input"
          id="email"
          name="email"
          type="email"
          placeholder="you@example.com"
          required
        />

        <label class="books-consent">
          <input
            class="books-consent__box"
            type="checkbox"
            id="consent"
            name="consent"
            value="yes"
            required
          />
          <span>I consent to being added to yfofana’s mailing list</span>
        </label>

        <input type="hidden" name="_subject" value="New Top 20 Books signup" />
        <input type="hidden" name="_captcha" value="false" />

        <button class="btn btn--primary books-form__btn" type="submit">
          Get the FREE Top 20 Books
        </button>

        <p class="books-form__hint" id="booksHint" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <script>
    (() => {
      const form = document.getElementById("booksForm");
      const hint = document.getElementById("booksHint");
      const btn = form.querySelector('button[type="submit"]');

      const isValidEmail = (email) =>
        /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i.test(String(email || "").trim());

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hint.textContent = "";

        const data = new FormData(form);
        const name = (data.get("name") || "").toString().trim();
        const email = (data.get("email") || "").toString().trim();
        const consent = document.getElementById("consent").checked;

        if (!name) {
          hint.textContent = "❗ Please enter your name.";
          return;
        }

        if (!isValidEmail(email)) {
          hint.textContent = "❗ Please enter a valid email.";
          return;
        }

        if (!consent) {
          hint.textContent = "❗ Please check the consent box.";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: data,
            headers: {
              Accept: "application/json"
            }
          });

          const result = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(result.errors?.[0]?.message || "Failed to send form.");
          }

          const qs = new URLSearchParams({ name, dl: "1" }).toString();
          window.location.href = `/thank-you.html?${qs}`;
        } catch (error) {
          hint.textContent = `❗ ${error.message || "Something went wrong. Please try again."}`;
          btn.disabled = false;
          btn.textContent = "Get the FREE Top 20 Books";
        }
      });
    })();
  </script>
</body>
</html>
